services:
  - type: web
    name: docxpress-api
    env: node
    plan: free
    buildCommand: |
      apt-get update && \
      apt-get install -y ghostscript ffmpeg && \
      which gs && \
      gs --version && \
      npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
